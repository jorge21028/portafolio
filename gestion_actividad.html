<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Actividad y Temporizador</title>

<style>
/* (SE MANTIENE TODO TU CSS IGUAL) */
*{margin:0;padding:0;box-sizing:border-box;}
label{display:block;margin-bottom:5px;color:#666;font-weight:500;}
input,textarea,select{
    width:100%;
    padding:10px;
    border:2px solid #ddd;
    border-radius:5px;
    margin-bottom:15px;
}
.row{display:flex;gap:15px;}
.row>div{flex:1;}
.puntos-col{flex:0 0 150px;}
button{padding:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<h1>⏱️ Gestión de Actividad y Cuenta Regresiva</h1>

<h2>Datos de la Actividad</h2>

<!-- SELECT NUEVO -->
<label>Grupo / Asignatura:</label>
<select id="grupoNombre" onchange="mostrarOtroCampo()">
    <option value="">Seleccionar...</option>
    <option value="3ro A - Taller Ofimática">Taller 3ro A</option>
    <option value="3ro B - Taller Ofimática">Taller 3ro B</option>
    <option value="4to B - Diseño y Desarrollo de Base de Datos" selected>DDBD</option>
    <option value="4to B - Diseño de Portales Web y Recursos Multimedia">DPWRM</option>
    <option value="4to C - Tecnologías Digitales">Tec. Dig.</option>
    <option value="5to B - Diseño de Aplicaciones y Sistemas de Información">DASI</option>
    <option value="6to B - Implementación y Mantenimiento de Sistemas Informáticos">IMASI</option>
    <option value="otros">Otros</option>
</select>

<!-- INPUT OTROS -->
<div id="otroCampo" style="display:none;">
    <input type="text" id="otroTexto" placeholder="Escriba la asignatura">
</div>

<label>Título de la Actividad:</label>
<input type="text" id="tituloActividad" value="Práctica de Normalización">

<div class="row">
<div>
<label>Descripción:</label>
<textarea id="actividadDescripcion">Diseño de Tablas</textarea>
</div>

<div class="puntos-col">
<label>Puntos:</label>
<input type="number" id="puntosActividad" value="10">
</div>

<div>
<label>Objetivo:</label>
<textarea id="objetivoActividad">Aplicar normalización</textarea>
</div>
</div>

<h2>Tiempo</h2>
<input type="number" id="inputMinutos" value="15">
<button id="setTimerButton">Establecer</button>

<hr>

<button id="startButton">Iniciar</button>
<button id="pauseButton">Pausar</button>
<button id="resetButton">Reset</button>

<button id="downloadButton">Descargar</button>

</div>

<script>
let totalSeconds=0;
let remainingSeconds=0;
let timerInterval=null;
let isRunning=false;

const tituloInput=document.getElementById('tituloActividad');
const puntosInput=document.getElementById('puntosActividad');
const objetivoInput=document.getElementById('objetivoActividad');
const actividadInput=document.getElementById('actividadDescripcion');
const minutosInput=document.getElementById('inputMinutos');

/* FUNCION NUEVA */
function mostrarOtroCampo(){
    const select=document.getElementById("grupoNombre");
    const campo=document.getElementById("otroCampo");

    campo.style.display = select.value==="otros" ? "block":"none";
}

/* FUNCION CLAVE */
function obtenerGrupo(){
    const select=document.getElementById("grupoNombre");
    if(select.value==="otros"){
        return document.getElementById("otroTexto").value;
    }
    return select.value;
}

function formatTime(sec){
    let m=Math.floor(sec/60);
    let s=sec%60;
    return `${m}:${s.toString().padStart(2,'0')}`;
}

function setTimer(){
    let min=parseInt(minutosInput.value)||15;
    totalSeconds=min*60;
    remainingSeconds=totalSeconds;
}

function startTimer(){
    if(isRunning) return;
    isRunning=true;

    timerInterval=setInterval(()=>{
        if(remainingSeconds>0){
            remainingSeconds--;
        }else{
            clearInterval(timerInterval);
            isRunning=false;
            alert("Tiempo terminado");
        }
    },1000);
}

function pauseTimer(){
    clearInterval(timerInterval);
    isRunning=false;
}

function resetTimer(){
    clearInterval(timerInterval);
    remainingSeconds=0;
    isRunning=false;
}

/* DESCARGA AJUSTADA */
function downloadActivityInfo(){

    const grupo=obtenerGrupo();
    const titulo=tituloInput.value;
    const descripcion=actividadInput.value;
    const puntos=puntosInput.value;
    const objetivo=objetivoInput.value;

    const content=
`Grupo: ${grupo}
Título: ${titulo}
Puntos: ${puntos}

Objetivo:
${objetivo}

Descripción:
${descripcion}`;

    const blob=new Blob([content],{type:'text/plain'});
    const url=URL.createObjectURL(blob);

    const a=document.createElement('a');
    a.href=url;
    a.download='actividad.txt';
    a.click();

    URL.revokeObjectURL(url);
}

/* EVENTOS */
document.getElementById('setTimerButton').onclick=setTimer;
document.getElementById('startButton').onclick=startTimer;
document.getElementById('pauseButton').onclick=pauseTimer;
document.getElementById('resetButton').onclick=resetTimer;
document.getElementById('downloadButton').onclick=downloadActivityInfo;

/* INIT */
setTimer();
</script>

</body>
</html>
