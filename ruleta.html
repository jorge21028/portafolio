<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario de Clases - Profesor: Jorge Luis Abreu, M.A.</title>
    <link rel="stylesheet" href="styles.css">
	<link rel="icon" type="image/png" href="icon/icon.png">
</head>
<body>
<div id="menu-container"></div>
<script src="menu.js"></script>
    <body>
   <div id="ruleta-principal-container">
        <h1>🎡 Ruleta de Turnos para Grupos</h1>

        <section class="carga-archivos">
            <h2>Cargar Grupos (.txt)</h2>
            <input type="file" id="archivosGrupos" multiple accept=".txt">
            <p id="infoCarga">Aún no se han cargado grupos.</p>
        </section>

        <hr>

        <section class="interaccion">
            <div class="ruleta-area">
                <p>Estudiantes restantes: <span id="contadorRestante">0</span></p>
                <div class="marco-ruleta">
                    <div id="ruleta" class="ruleta">
                        <div class="puntero"></div>
                    </div>
                </div>
                <button id="botonGirar" disabled>Girar Ruleta</button>
            </div>

            <div class="historial-area">
                <h2>👤 Historial de Turnos Seleccionados</h2>
                <div id="historialSalida" class="caja-salida">
                    <p>Haga clic en "Girar Ruleta" para comenzar.</p>
                </div>
                <button id="botonReiniciar">Reiniciar Ruleta</button>
            </div>
        </section>
    </div>

    <script src="ruleta_turnos.js"></script>
</body>
</html>
